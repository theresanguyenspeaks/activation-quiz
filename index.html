const state = {

  answers: new Array(questions.length).fill(null)
};

const shopUrl = 'https://theresanguyenspeaks.com/shop';

const quizEl = document.getElementById('quiz');
const resultsEl = document.getElementById('results');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');

function updateProgress() {
  const pct = Math.max((state.current / questions.length) * 100, 4);
  progressFill.style.width = pct + '%';
  progressText.textContent = `Question ${Math.min(state.current + 1, questions.length)} of ${questions.length}`;
}

function renderQuiz() {
  const q = questions[state.current];
  const selected = state.answers[state.current];

  quizEl.classList.remove('active');
  resultsEl.classList.remove('active');

  setTimeout(() => {
    quizEl.innerHTML = `
      <div class="step active" role="group" aria-labelledby="qtext">
        <p class="question" id="qtext">${state.current + 1}. ${q.question}</p>
        <div class="options">
          ${q.options.map((opt, idx) => `
            <button class="option-btn${selected === idx ? ' selected' : ''}" data-opt="${idx}">
              ${opt.text}
            </button>
          `).join('')}
        </div>
      </div>
      <div class="nav-buttons">
        <button class="btn btn-secondary" data-action="back">← Back</button>
        <button class="btn btn-ghost" data-action="skip">Skip</button>
        <button class="btn btn-primary" data-action="next" ${selected === null ? 'disabled' : ''}>
          ${state.current === questions.length - 1 ? 'See My Results' : 'Continue →'}
        </button>
      </div>
    `;

    updateProgress();
  }, 60);
}

function showResults() {
  const scores = {};
  offerings.forEach(o => scores[o.id] = 0);

  state.answers.forEach((answerIdx, qIdx) => {
    if (answerIdx === null) return;
    const tags = questions[qIdx].options[answerIdx].tags;
    offerings.forEach(o => {
      tags.forEach(tag => {
        if (o.tags.includes(tag)) scores[o.id] += 1;
      });
    });
  });

  const recommended = offerings
    .map(o => ({ ...o, score: scores[o.id] }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 4)
    .filter(o => o.score > 0);

  if (!recommended.length) recommended.push(offerings[6]);

  const main = recommended[0];
  const extra = recommended.slice(1);

  progressFill.style.width = '100%';
  progressText.textContent = 'Complete';

  quizEl.classList.remove('active');

  setTimeout(() => {
    resultsEl.classList.add('active');
    resultsEl.innerHTML = `
      <div class="results-header">
        <h2>Your Personal Activation</h2>
        <p>This session is most aligned with where you are right now.</p>
      </div>
      <div class="results-grid">
        <div class="result-card primary">
          <span class="duration">${main.duration}</span>
          <h3>${main.title}</h3>
          <p>${main.description}</p>
        </div>
      </div>
      ${extra.length ? '<p class="restart-note support-note">We also recommend these activations to support your journey.</p>' : ''}
      ${extra.length ? `<div class="results-grid">${extra.map((rec) => `
          <div class="result-card">
            <span class="duration">${rec.duration}</span>
            <h3>${rec.title}</h3>
            <p>${rec.description}</p>
          </div>
        `).join('')}</div>` : ''}
      <p class="restart-note">Scroll down below this quiz to add your chosen activation to cart in the shop.</p>
      <button class="restart-btn" data-action="restart">Start Over</button>
    `;
    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 60);
}

quizEl.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const action = btn.dataset.action;
  if (!action) return;

  if (action === 'back' && state.current > 0) {
    state.current -= 1;
    renderQuiz();
    return;
  }

  if (action === 'next') {
    const selected = quizEl.querySelector('.option-btn.selected');
    state.answers[state.current] = selected ? parseInt(selected.dataset.opt, 10) : null;
    if (state.current < questions.length - 1) {
      state.current += 1;
      renderQuiz();
    } else {
      showResults();
    }
    return;
  }

  if (action === 'skip') {
    if (state.current < questions.length - 1) {
      state.answers[state.current] = null;
      state.current += 1;
      renderQuiz();
    }
    return;
  }

  if (action === 'restart') {
    state.current = 0;
    state.answers = new Array(questions.length).fill(null);
    resultsEl.innerHTML = '';
    quizEl.classList.add('active');
    renderQuiz();
  }
});

quizEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.option-btn');
  if (!btn) return;
  quizEl.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const nextBtn = quizEl.querySelector('[data-action="next"]');
  if (nextBtn) nextBtn.disabled = false;
});

resultsEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.restart-btn');
  if (!btn) return;
  state.current = 0;
  state.answers = new Array(questions.length).fill(null);
  resultsEl.innerHTML = '';
  quizEl.classList.add('active');
  renderQuiz();
});

const openButton = document.getElementById('openShopBtn');
if (openButton) {
  openButton.addEventListener('click', () => {
    const shopUrl = 'https://theresanguyenspeaks.com/shop';
    if (shopUrl) window.open(shopUrl, '_blank', 'noopener,noreferrer');
  });
}

renderQuiz();
</script>
</body>
</html>
