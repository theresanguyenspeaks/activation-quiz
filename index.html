<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Dragon Activation | Theresa Nguyen Speaks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #faf8f5 0%, #f3efe9 100%);
    color: #2c2416;
    min-height: 100vh;
    line-height: 1.6;
  }
  
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  
  header {
    text-align: center;
    padding: 40px 0 32px;
    border-bottom: 1px solid #e8e2d6;
    margin-bottom: 32px;
  }
  
  header h1 {
    font-size: 2.2em;
    font-weight: 300;
    color: #5a4532;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }
  
  header p {
    font-size: 1.1em;
    color: #7a6852;
    max-width: 600px;
    margin: 0 auto;
    font-style: italic;
  }
  
  .progress-bar {
    background: #e8e2d6;
    height: 4px;
    border-radius: 2px;
    margin: 32px 0 40px;
    overflow: hidden;
    position: sticky;
    top: 20px;
    z-index: 10;
    backdrop-filter: blur(8px);
  }
  
  .progress-fill {
    background: linear-gradient(90deg, #8b6f47 0%, #b8956a 100%);
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }
  
  .progress-text {
    text-align: center;
    color: #7a6852;
    font-size: 0.85em;
    margin-top: 8px;
    font-weight: 500;
  }
  
  .question-container {
    display: none;
    animation: fadeInUp 0.5s ease;
  }
  
  .question-container.active {
    display: block;
  }
  
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .question {
    font-size: 1.35em;
    margin-bottom: 28px;
    color: #3c2f1f;
    font-weight: 400;
    line-height: 1.4;
  }
  
  .options {
    display: grid;
    gap: 12px;
  }
  
  .option-btn {
    background: white;
    border: 2px solid #e0d6c8;
    padding: 18px 22px;
    border-radius: 14px;
    cursor: pointer;
    text-align: left;
    font-size: 1em;
    color: #2c2416;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  
  .option-btn:hover {
    border-color: #b8956a;
    background: #fdfaf6;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(139, 111, 71, 0.12);
  }
  
  .option-btn.selected {
    background: linear-gradient(135deg, #fdfaf6 0%, #f8f2e8 100%);
    border-color: #8b6f47;
    box-shadow: 0 4px 16px rgba(139, 111, 71, 0.15);
  }
  
  .option-btn.selected::after {
    content: "";
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    background: #8b6f47;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 36px;
    gap: 16px;
  }
  
  .btn {
    padding: 14px 28px;
    border: none;
    border-radius: 10px;
    font-size: 1em;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
    flex: 1;
  }
  
  .btn-primary {
    background: linear-gradient(135deg, #8b6f47 0%, #6b5638 100%);
    color: white;
  }
  
  .btn-primary:hover {
    background: linear-gradient(135deg, #6b5638 0%, #5a4532 100%);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(107, 86, 56, 0.25);
  }
  
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }
  
  .btn-secondary {
    background: white;
    color: #7a6852;
    border: 2px solid #e0d6c8;
  }
  
  .btn-secondary:hover {
    border-color: #b8956a;
    color: #5a4532;
  }
  
  .btn-ghost {
    background: transparent;
    color: #7a6852;
    padding: 14px 20px;
    flex: 0 0 auto;
  }
  
  .btn-ghost:hover {
    color: #5a4532;
    background: #f5f0e8;
  }
  
  .results-container {
    display: none;
    animation: fadeInUp 0.6s ease;
  }
  
  .results-container.active {
    display: block;
  }
  
  .results-header {
    text-align: center;
    margin-bottom: 36px;
  }
  
  .results-header h2 {
    font-size: 2em;
    font-weight: 300;
    color: #5a4532;
    margin-bottom: 8px;
  }
  
  .results-header p {
    color: #7a6852;
    font-style: italic;
  }
  
  .results-grid {
    display: grid;
    gap: 20px;
  }
  
  .result-card {
    background: white;
    border-radius: 16px;
    padding: 28px 28px 24px;
    box-shadow: 0 2px 12px rgba(44, 36, 22, 0.06);
    border: 1px solid #f0ebe0;
    transition: all 0.3s ease;
    position: relative;
  }
  
  .result-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(139, 111, 71, 0.14);
  }
  
  .result-card.primary {
    border: 2px solid #c9a96e;
    background: linear-gradient(135deg, #ffffff 0%, #fefcf8 100%);
  }
  
  .result-card.primary::before {
    content: "Best Match";
    position: absolute;
    top: -12px;
    left: 24px;
    background: linear-gradient(135deg, #c9a96e 0%, #b8956a 100%);
    color: white;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.75em;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  
  .result-card h3 {
    font-size: 1.35em;
    color: #3c2f1f;
    margin-bottom: 8px;
    margin-top: 4px;
    font-weight: 500;
  }
  
  .result-card .duration {
    display: inline-block;
    background: #f5f0e8;
    color: #7a6852;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.85em;
    margin-bottom: 12px;
    font-weight: 500;
  }
  
  .result-card p {
    color: #5a4f3f;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  
  .shop-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #2c2416;
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 500;
    transition: all 0.2s ease;
  }
  
  .shop-link:hover {
    background: #5a4532;
    transform: translateX(2px);
  }
  
  .restart-btn {
    display: block;
    margin: 40px auto 0;
    background: transparent;
    color: #7a6852;
    border: 2px solid #d9cebf;
    padding: 12px 32px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1em;
    transition: all 0.2s ease;
  }
  
  .restart-btn:hover {
    border-color: #b8956a;
    color: #5a4532;
  }
  
  @media (max-width: 600px) {
    header h1 { font-size: 1.7em; }
    .question { font-size: 1.15em; }
    .result-card { padding: 22px 20px 20px; }
    .result-card h3 { font-size: 1.2em; }
    .nav-buttons { flex-direction: column-reverse; }
    .btn { width: 100%; }
    .btn-ghost { flex: 1 1 auto; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Find Your Dragon Activation</h1>
      <p>Answer 7 questions to discover which Dragon Energy healing sessions best support where you are right now.</p>
    </header>
    
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">Question 1 of 7</div>
    
    <div id="quiz"></div>
    <div id="results" class="results-container"></div>
  </div>

<script>
const offerings = [
  {
    id: 'soulmate',
    title: 'Attract Your Soulmate',

  },

  },
  {

  {

    description: 'Illuminate your life purpose and connect with your soul\'s unique path. Gain clarity, dissolve self-doubt, and align with your heart\'s true desires.',
    tags: ['purpose', 'direction', 'meaning', 'clarity', 'path']
  },
  {
    id: 'dna-codes',
    title: 'Dragon DNA Light Codes Activation',
    duration: '34 minutes',
    description: 'Activate dormant light codes within your DNA. Unlock higher potentials, spiritual gifts, and a stronger connection to universal wisdom.',
    tags: ['dna', 'codes', 'activation', 'spiritual', 'potential', 'awakening']
  },
  {
    id: 'inner-peace',
    title: 'Inner Peace',
    duration: '34 minutes',
    description: 'Release stress, quiet the mind, and dissolve emotional turbulence. Enter a deep state of tranquility and inner calm.',
    tags: ['peace', 'calm', 'stress', 'anxiety', 'quiet', 'tranquility']
  },
  {
    id: 'money',
    title: 'Money Abundance',
    duration: '35 minutes',
    description: 'Align with the flow of financial prosperity. Release limiting beliefs around money and open your energetic channels to attract wealth and success.',
    tags: ['money', 'abundance', 'prosperity', 'wealth', 'financial', 'limiting beliefs']
  },
  {
    id: 'third-eye',
    title: 'Open Up Your Third Eye',
    duration: '37 minutes',
    description: 'Enhance your intuitive abilities. Clear energetic blocks, sharpen perception, and trust your inner wisdom more deeply.',
    tags: ['intuition', 'third-eye', 'clarity', 'wisdom', 'perception', 'insight']
  },
  {
    id: 'chakras',
    title: 'Unlock The Power Of Your Chakras',
    duration: '38 minutes',
    description: 'Bring your chakras into perfect harmony and alignment. Clear blockages, revitalize energy centers, and support balanced flow throughout your system.',
    tags: ['chakras', 'energy', 'centers', 'balance', 'harmony', 'alignment']
  },
  {
    id: 'spiritual-gifts',
    title: 'Unlock Your Spiritual Gifts',
    duration: '38 minutes',
    description: 'Awaken and amplify your innate spiritual gifts. Clear energetic blocks, sharpen intuition, and connect to your highest spiritual guidance.',
    tags: ['spiritual gifts', 'intuition', 'healing', 'abilities', 'awakening']
  }
];

const questions = [
  {
    question: "What feels most out of balance in your life right now?",
    options: [
      { text: "Relationships and love", tags: ['love', 'relationships', 'soulmate', 'self-love'] },
      { text: "Money and abundance", tags: ['money', 'abundance', 'prosperity', 'wealth', 'limiting beliefs'] },
      { text: "Inner peace and stress", tags: ['peace', 'calm', 'stress', 'anxiety', 'quiet'] },
      { text: "Spiritual connection and intuition", tags: ['intuition', 'spiritual', 'wisdom', 'third-eye', 'spiritual gifts', 'dna'] },
      { text: "Energy and vitality", tags: ['energy', 'blocks', 'chakras', 'balance', 'clearing', 'negativity'] }
    ]
  },
  {
    question: "When you quiet your mind, what thought or feeling comes up most often?",
    options: [
      { text: "\"I'm not worthy of love\"", tags: ['self-love', 'self-worth', 'soulmate', 'compassion'] },
      { text: "\"I'll never have enough\"", tags: ['money', 'abundance', 'limiting beliefs', 'blocks'] },
      { text: "\"I don't know what I'm supposed to do\"", tags: ['purpose', 'direction', 'meaning', 'clarity'] },
      { text: "\"My intuition is blocked\"", tags: ['intuition', 'third-eye', 'spiritual gifts', 'wisdom'] },
      { text: "\"I carry so much heaviness\"", tags: ['negativity', 'clearing', 'stress', 'chakras', 'energy'] }
    ]
  },
  {
    question: "What would your ideal day feel like?",
    options: [
      { text: "Connected to a loving partner or deep friendships", tags: ['soulmate', 'relationships', 'love', 'heart'] },
      { text: "Financially free and able to give freely", tags: ['money', 'abundance', 'prosperity', 'wealth'] },
      { text: "Peaceful, grounded, and emotionally steady", tags: ['peace', 'calm', 'self-love', 'inner', 'balance'] },
      { text: "Clear about my purpose and moving forward with confidence", tags: ['purpose', 'clarity', 'direction', 'meaning'] },
      { text: "Awake, intuitive, and spiritually alive", tags: ['intuition', 'spiritual', 'third-eye', 'dna', 'spiritual gifts', 'awakening'] }
    ]
  },
  {
    question: "Which area of yourself do you most want to heal or expand?",
    options: [
      { text: "My heart and capacity for love", tags: ['soulmate', 'self-love', 'heart', 'compassion', 'love'] },
      { text: "My relationship with myself and my worth", tags: ['self-love', 'self-worth', 'worth', 'compassion'] },
      { text: "My financial mindset and opportunities", tags: ['money', 'abundance', 'limiting beliefs', 'blocks'] },
      { text: "My intuition and inner knowing", tags: ['intuition', 'third-eye', 'spiritual gifts', 'wisdom', 'perception'] },
      { text: "My energy, clarity, and spiritual gifts", tags: ['energy', 'blocks', 'dna', 'spiritual gifts', 'chakras', 'clearing', 'spiritual'] }
    ]
  },
  {
    question: "When do you notice the most resistance in your life?",
    options: [
      { text: "In matters of the heart or vulnerability", tags: ['soulmate', 'self-love', 'heart', 'relationships'] },
      { text: "Around money or asking for what I deserve", tags: ['money', 'abundance', 'blocks', 'limiting beliefs', 'worth'] },
      { text: "When I try to relax or stop worrying", tags: ['peace', 'stress', 'anxiety', 'calm', 'quiet'] },
      { text: "When I need to make an important decision", tags: ['intuition', 'third-eye', 'clarity', 'wisdom', 'purpose'] },
      { text: "I feel perpetually stuck or heavy", tags: ['negativity', 'blocks', 'chakras', 'energy', 'clearing', 'balance'] }
    ]
  },
  {
    question: "What are you most ready to release?",
    options: [
      { text: "Past relationship wounds and loneliness", tags: ['soulmate', 'relationships', 'love', 'heart', 'clearing'] },
      { text: "Fear around money and not having enough", tags: ['money', 'abundance', 'limiting beliefs', 'blocks', 'prosperity'] },
      { text: "Self-criticism and not feeling good enough", tags: ['self-love', 'self-worth', 'worth', 'compassion'] },
      { text: "Confusion about my direction and purpose", tags: ['purpose', 'clarity', 'direction', 'meaning'] },
      { text: "Mental noise and emotional heaviness", tags: ['negativity', 'stress', 'peace', 'calm', 'clearing', 'chakras', 'energy'] }
    ]
  },
  {
    question: "What outcome do you most deeply desire?",
    options: [
      { text: "A loving, soulmate relationship", tags: ['soulmate', 'love', 'relationships', 'heart'] },
      { text: "Financial freedom and security", tags: ['money', 'abundance', 'prosperity', 'wealth'] },
      { text: "Deep self-love and inner peace", tags: ['self-love', 'peace', 'calm', 'self-worth', 'compassion', 'inner'] },
      { text: "Clarity of purpose and forward momentum", tags: ['purpose', 'clarity', 'direction', 'meaning', 'path'] },
      { text: "Spiritual awakening and intuitive strength", tags: ['intuition', 'spiritual', 'third-eye', 'dna', 'spiritual gifts', 'awakening'] }
    ]
  }
];

function calculateScores(answers) {
  const scores = {};
  offerings.forEach(o => scores[o.id] = 0);
  
  answers.forEach((answerIdx, qIdx) => {
    if (answerIdx !== null) {
      const selectedTags = questions[qIdx].options[answerIdx].tags;
      offerings.forEach(o => {
        selectedTags.forEach(tag => {
          if (o.tags.includes(tag)) {
            scores[o.id] += 1;
          }
        });
      });
    }
  });
  
  return scores;
}

function getRecommendations(scores) {
  return offerings
    .map(o => ({ ...o, score: scores[o.id] }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 4)
    .filter(o => o.score > 0);
}

function renderQuestion(qIdx) {
  const quizEl = document.getElementById('quiz');
  const q = questions[qIdx];
  
  let html = `
    <div class="question-container active">
      <div class="question">${qIdx + 1}. ${q.question}</div>
      <div class="options">
        ${q.options.map((opt, idx) => `
          <button class="option-btn" data-q="${qIdx}" data-opt="${idx}">
            ${opt.text}
          </button>
        `).join('')}
      </div>
      <div class="nav-buttons">
        <button class="btn btn-secondary" id="prevBtn" ${qIdx === 0 ? 'style="visibility: hidden;"' : ''}>
          ← Back
        </button>
        <button class="btn btn-ghost" id="skipBtn">Skip</button>
        <button class="btn btn-primary" id="nextBtn" disabled>
          ${qIdx === questions.length - 1 ? 'See My Results' : 'Continue →'}
        </button>
      </div>
    </div>
  `;
  
  quizEl.innerHTML = html;
  
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const progressPercent = ((qIdx) / questions.length) * 100;
  progressFill.style.width = progressPercent + '%';
  progressText.textContent = `Question ${qIdx + 1} of ${questions.length}`;
  
  const optionBtns = quizEl.querySelectorAll('.option-btn');
  optionBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      optionBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('nextBtn').disabled = false;
    });
  });
  
  document.getElementById('prevBtn').addEventListener('click', () => {
    if (qIdx > 0) {
      renderQuestion(qIdx - 1);
    }
  });
  
  document.getElementById('skipBtn').addEventListener('click', () => {
    if (qIdx < questions.length - 1) {
      renderQuestion(qIdx + 1);
    }
  });
  
  document.getElementById('nextBtn').addEventListener('click', () => {
    const selected = document.querySelector('.option-btn.selected');
    if (selected) {
      userAnswers[qIdx] = parseInt(selected.dataset.opt);
    } else {
      userAnswers[qIdx] = null;
    }
    
    if (qIdx < questions.length - 1) {
      renderQuestion(qIdx + 1);
    } else {
      showResults();
    }
  });
}

function showResults() {
  const quizEl = document.getElementById('quiz');
  const resultsEl = document.getElementById('results');
  
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressText').textContent = 'Complete';
  
  const scores = calculateScores(userAnswers);
  const recommendations = getRecommendations(scores);
  
  if (recommendations.length === 0) {
    recommendations.push(offerings[6]); // Default to Inner Peace
  }
  
  let html = `
    <div class="results-container active">
      <div class="results-header">
        <h2>Your Personal Activations</h2>
        <p>Based on your journey, here are the sessions most aligned with your needs right now.</p>
      </div>
      <div class="results-grid">
  `;
  
  recommendations.forEach((rec, idx) => {
    const isPrimary = idx === 0;
    html += `
      <div class="result-card ${isPrimary ? 'primary' : ''}">
        <div class="duration">${rec.duration}</div>
        <h3>${rec.title}</h3>
        <p>${rec.description}</p>
        <a href="https://theresanguyenspeaks.com/shop" target="_blank" class="shop-link">
          View in Shop →
        </a>
      </div>
    `;
  });
  
  html += `
      </div>
      <button class="restart-btn" id="restartBtn">Start Over</button>
    </div>
  `;
  
  quizEl.style.display = 'none';
  document.querySelector('.progress-bar').style.display = 'none';
  document.querySelector('.progress-text').style.display = 'none';
  document.querySelector('header').querySelector('p').textContent = 'Here are your personalized Dragon Energy recommendations.';
  
  resultsEl.innerHTML = html;
  
  document.getElementById('restartBtn').addEventListener('click', () => {
    userAnswers = new Array(questions.length).fill(null);
    quizEl.style.display = 'block';
    document.querySelector('.progress-bar').style.display = 'block';
    document.querySelector('.progress-text').style.display = 'block';
    document.querySelector('header').querySelector('p').textContent = 'Answer 7 questions to discover which Dragon Energy healing sessions best support where you are right now.';
    resultsEl.innerHTML = '';
    resultsEl.classList.remove('active');
    resultsEl.style.display = 'none';
    renderQuestion(0);
  });
}

let userAnswers = new Array(questions.length).fill(null);
renderQuestion(0);
</script>
</body>
</html>
